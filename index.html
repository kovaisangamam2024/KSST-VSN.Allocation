<!DOCTYPE html>
<html>
<head>
<title>KSST Satsang Allocation</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
text-align:center;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:750px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.logo{
width:120px;
margin-bottom:10px;
}

textarea{
width:100%;
height:160px;
padding:10px;
font-size:16px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
background:#2e8b57;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1f6f45;
}

#output{
margin-top:20px;
background:#eee;
padding:15px;
white-space:pre-wrap;
text-align:left;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<img src="ksstlogo.png" class="logo">

<h2>KSST Satsang Allocation Tool</h2>

<textarea id="names" placeholder="Enter names (one per line)"></textarea>

<br>

<button onclick="allocate()">Allocate</button>
<button onclick="copyAlloc()">Copy Allocation</button>
<button onclick="downloadCSV()">Download Excel</button>

<div id="output"></div>

</div>

<script>

let allocationText=""

function splitRange(start,end,count){

let total=end-start+1
let base=Math.floor(total/count)
let extra=total%count

let ranges=[]
let current=start

for(let i=0;i<count;i++){

let size=base+(i<extra?1:0)

let rStart=current
let rEnd=current+size-1

ranges.push(rStart+"-"+rEnd)

current=rEnd+1

}

return ranges

}

function allocate(){

let names=document.getElementById("names").value.trim().split("\n")

if(names.length==0){
alert("Enter names")
return
}

let output=""

output+="Starting Prayer : Mahalakshmi Ashtakam\n\n"

let index=0

// Poorvanga

let poorv=splitRange(1,22,names.length)

for(let i=0;i<poorv.length;i++){
output+="Poorvanga "+poorv[i]+" ---- "+names[i]+"\n"
}

output+="\n"

// Nyasa

output+="Nyasa ---- "+names[index%names.length]+"\n"
index++

output+="\n"

// Dhyanam

output+="Dhyanam 1-3 ---- "+names[index%names.length]+"\n"
index++

output+="Dhyanam 4-8 ---- "+names[index%names.length]+"\n"
index++

output+="\n"

// Main Sloka (max 10)

let start=1

while(start<=108){

let end=start+9

if(end>108){
end=108
}

output+="Sloka "+start+"-"+end+" ---- "+names[index%names.length]+"\n"

start=end+1
index++

}

output+="\n"

// Phalashruti

let phala=splitRange(1,33,names.length)

for(let i=0;i<phala.length;i++){
output+="Phalashruti "+phala[i]+" ---- "+names[i]+"\n"
}

output+="\n"

output+="Ending Prayer\n"

document.getElementById("output").innerText=output

allocationText=output

}

// Copy Button

function copyAlloc(){

navigator.clipboard.writeText(allocationText)

alert("Allocation copied")

}

// Download Excel

function downloadCSV(){

let csv=allocationText.replace(/\n/g,"\n")

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="KSST_Allocation.csv"

a.click()

}

</script>

</body>
  </html>
