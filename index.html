<!DOCTYPE html>
<html>
<head>
<title>KSST Satsang Allocation Tool</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:20px;
}

.logo{
width:120px;
margin-bottom:10px;
}

h1{
color:#7b0000;
}

textarea{
width:300px;
height:120px;
margin:10px;
padding:10px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#7b0000;
color:white;
border-radius:5px;
cursor:pointer;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#7b0000;
color:white;
}
</style>
</head>

<body>

<img src="ksst-logo.png" class="logo">

<h1>KSST Satsang Sloka Allocation</h1>

<p>Enter Names (one per line)</p>

<textarea id="names"></textarea><br>

<button onclick="allocate()">Generate Allocation</button>
<button onclick="copyTable()">Copy Allocation</button>
<button onclick="downloadExcel()">Download Excel</button>

<table id="allocationTable">
<thead>
<tr>
<th>Name</th>
<th>Poorvangam</th>
<th>Dhyanam</th>
<th>Main Sloka</th>
<th>Phalasruthi</th>
<th>Mahalakshmi Ashtakam</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

function splitRange(total, people){
let result=[]
let base=Math.floor(total/people)
let extra=total%people
let start=1

for(let i=0;i<people;i++){
let count=base+(i<extra?1:0)
let end=start+count-1
result.push(start+"-"+end)
start=end+1
}
return result
}

function splitMain(total){
let result=[]
let start=1

while(start<=total){
let end=start+9
if(end>total) end=total
result.push(start+"-"+end)
start=end+1
}
return result
}

function allocate(){

let names=document.getElementById("names").value.trim().split("\n")
let people=names.length

let poorvangam=splitRange(22,people)
let phalasruthi=splitRange(33,people)

let main=splitMain(108)

let table=document.getElementById("allocationTable").getElementsByTagName("tbody")[0]

table.innerHTML=""

for(let i=0;i<people;i++){

let dhyanam=""

if(i==0) dhyanam="1-3"
else if(i==1) dhyanam="4-8"
else dhyanam="-"

let mainSloka=main[i] || "-"

let maha=""

if(i==0) maha="Mahalakshmi Ashtakam"

let row=table.insertRow()

row.insertCell(0).innerText=names[i]
row.insertCell(1).innerText=poorvangam[i] || "-"
row.insertCell(2).innerText=dhyanam
row.insertCell(3).innerText=mainSloka
row.insertCell(4).innerText=phalasruthi[i] || "-"
row.insertCell(5).innerText=maha

}

}

function copyTable(){

let table=document.getElementById("allocationTable")

let text=""

for(let r=0;r<table.rows.length;r++){

let row=[]

for(let c=0;c<table.rows[r].cells.length;c++){

row.push(table.rows[r].cells[c].innerText)

}

text+=row.join("\t")+"\n"

}

navigator.clipboard.writeText(text)

alert("Allocation Copied")

}

function downloadExcel(){

let table=document.getElementById("allocationTable")

let rows=[]

for(let i=0;i<table.rows.length;i++){

let cols=table.rows[i].cells

let row=[]

for(let j=0;j<cols.length;j++){

row.push(cols[j].innerText)

}

rows.push(row.join(","))

}

let csv=rows.join("\n")

let blob=new Blob([csv],{type:"text/csv"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="KSST_Satsang_Allocation.csv"

link.click()

}

</script>

</body>
</html>
