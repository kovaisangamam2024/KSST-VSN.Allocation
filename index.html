<!DOCTYPE html>
<html>

<head>

<title>KSST Satsang Allocation</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#4CAF50;
padding:15px;
color:white;
text-align:center;
}

.logo{
width:80px;
display:block;
margin:auto;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

textarea{
height:180px;
}

button{
padding:10px 14px;
margin:5px;
background:#4CAF50;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#388E3C;
}

.output{
background:#eee;
padding:15px;
margin-top:20px;
white-space:pre-wrap;
font-family:monospace;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<img src="ksstlogo.png" class="logo">

<h2>KSST Satsang Allocation Tool</h2>

</header>

<div class="container">

<input id="batch" placeholder="Batch Number">

<input id="date" placeholder="Satsang Date">

<textarea id="names" placeholder="Enter Names (one per line)"></textarea>

<button onclick="allocate()">Allocate</button>

<button onclick="randomize()">Randomize Names</button>

<button onclick="copyAlloc()">Copy Allocation</button>

<button onclick="downloadExcel()">Download Excel</button>

<div id="result" class="output"></div>

</div>

<script>

let allocationText=""

function splitRange(start,end,count){

let total=end-start+1

let base=Math.floor(total/count)

let extra=total%count

let ranges=[]

let current=start

for(let i=0;i<count;i++){

let size=base+(i<extra?1:0)

let s=current

let e=current+size-1

ranges.push(s+"-"+e)

current=e+1

}

return ranges

}

function allocate(){

let names=document.getElementById("names").value.trim().split("\n")

let batch=document.getElementById("batch").value

let date=document.getElementById("date").value

let text=""

text+="Batch : "+batch+"\n"

text+="Date : "+date+"\n\n"

text+="Starting Prayer : Mahalakshmi Ashtakam\n\n"

let index=0

let poorv=splitRange(1,22,names.length)

for(let i=0;i<names.length;i++){

text+="Poorvanga "+poorv[i]+" ---- "+names[i]+"\n"

}

text+="\nNyasa ---- "+names[index%names.length]+"\n"

index++

text+="\nDhyanam 1-3 ---- "+names[index%names.length]+"\n"

index++

text+="Dhyanam 4-8 ---- "+names[index%names.length]+"\n\n"

index++

let start=1

while(start<=108){

let end=start+9

if(end>108) end=108

text+="Sloka "+start+"-"+end+" ---- "+names[index%names.length]+"\n"

start=end+1

index++

}

text+="\n"

let phala=splitRange(1,33,names.length)

for(let i=0;i<names.length;i++){

text+="Phalashruti "+phala[i]+" ---- "+names[i]+"\n"

}

text+="\nEnding Prayer\n"

document.getElementById("result").innerText=text

allocationText=text

}

function randomize(){

let names=document.getElementById("names").value.trim().split("\n")

for(let i=names.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let t=names[i]

names[i]=names[j]

names[j]=t

}

document.getElementById("names").value=names.join("\n")

}

function copyAlloc(){

navigator.clipboard.writeText(allocationText)

alert("Allocation Copied")

}

function downloadExcel(){

let blob=new Blob([allocationText],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="KSST_Allocation.csv"

a.click()

}

</script>

</body>

</html>
