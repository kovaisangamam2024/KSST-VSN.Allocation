<!DOCTYPE html>
<html>
<head>
<title>KSST Satsang Allocation Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#8B0000;
color:white;
padding:15px;
text-align:center;
}

.logo{
width:80px;
display:block;
margin:auto;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

textarea{
height:160px;
}

button{
padding:10px 15px;
margin-top:10px;
background:#8B0000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#5a0000;
}

.output{
background:#eee;
padding:15px;
margin-top:20px;
white-space:pre-wrap;
font-family:monospace;
border-radius:6px;
}
</style>
</head>

<body>

<header>
<img src="ksstlogo.png" class="logo">
<h2>KSST Satsang Allocation Tool</h2>
</header>

<div class="container">

<input id="batch" placeholder="Batch Name">
<input id="date" placeholder="Satsang Date">

<textarea id="names" placeholder="Enter Names (one per line)"></textarea>

<button onclick="allocate()">Allocate</button>
<button onclick="randomize()">Randomize Names</button>
<button onclick="copyAllocation()">Copy Allocation</button>
<button onclick="downloadExcel()">Download Excel</button>

<div id="result" class="output"></div>

</div>

<script>

let allocationText=""
let csvRows=[]

function allocate(){

let names=document.getElementById("names").value.trim().split("\n")
let batch=document.getElementById("batch").value
let date=document.getElementById("date").value

let text=""
csvRows=[["Section","Sloka Range","Name"]]

text+="Batch : "+batch+"\n"
text+="Date : "+date+"\n\n"

text+="Starting Prayer\n"
text+="Mahalakshmi Ashtakam\n\n"

let index=0

// POORVANGAM max 6
let start=1

while(start<=22){

let end=start+5
if(end>22) end=22

let person=names[index%names.length]

text+="Poorvanga "+start+"-"+end+" ---- "+person+"\n"

csvRows.push(["Poorvanga",start+"-"+end,person])

start=end+1
index++

}

text+="\nNyasa ---- "+names[index%names.length]+"\n"
csvRows.push(["Nyasa","-",names[index%names.length]])

index++

// DHYANAM
text+="\nDhyanam 1-3 ---- "+names[index%names.length]+"\n"
csvRows.push(["Dhyanam","1-3",names[index%names.length]])

index++

text+="Dhyanam 4-8 ---- "+names[index%names.length]+"\n\n"
csvRows.push(["Dhyanam","4-8",names[index%names.length]])

index++

// MAIN SLOKA max 10
start=1

while(start<=108){

let end=start+9
if(end>108) end=108

let person=names[index%names.length]

text+="Sloka "+start+"-"+end+" ---- "+person+"\n"

csvRows.push(["Main Sloka",start+"-"+end,person])

start=end+1
index++

}

text+="\n"

// PHALASRUTHI max 10
start=1

while(start<=33){

let end=start+9
if(end>33) end=33

let person=names[index%names.length]

text+="Phalashruti "+start+"-"+end+" ---- "+person+"\n"

csvRows.push(["Phalasruthi",start+"-"+end,person])

start=end+1
index++

}

text+="\nEnding Prayer\n"

allocationText=text
document.getElementById("result").innerText=text

}

// RANDOMIZE NAMES
function randomize(){

let names=document.getElementById("names").value.trim().split("\n")

for(let i=names.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=names[i]
names[i]=names[j]
names[j]=temp

}

document.getElementById("names").value=names.join("\n")

}

// COPY
function copyAllocation(){

navigator.clipboard.writeText(allocationText)
alert("Allocation Copied")

}

// DOWNLOAD EXCEL
function downloadExcel(){

let csvContent=csvRows.map(e=>e.join(",")).join("\n")

let blob=new Blob([csvContent],{type:"text/csv"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="KSST_Allocation.csv"

link.click()

}

</script>

</body>
</html>
